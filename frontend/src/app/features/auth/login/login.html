<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="logo-square-dark.png" alt="LiveStockExchange" class="logo-img" />
      <span class="logo-text">LiveStockExchange</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to access your favourites</p>

    <!-- Error -->
    @if (error()) {
      <div class="error-banner">
        <span>{{ error() }}</span>
        <button (click)="error.set('')">×</button>
      </div>
    }

    <!-- Form -->
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        [disabled]="loading()"
        (keyup.enter)="submit()"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        [disabled]="loading()"
        (keyup.enter)="submit()"
      />
    </div>

    <button
      class="btn-submit"
      (click)="submit()"
      [disabled]="loading() || !email || !password"
    >
      {{ loading() ? 'Signing in...' : 'Sign in' }}
    </button>

    <p class="auth-footer">
      No account? <a routerLink="/register">Create one</a>
    </p>

    <p class="auth-footer" style="margin-top: 6px">
      <a routerLink="/">← Back to charts</a>
    </p>

  </div>
</div>
