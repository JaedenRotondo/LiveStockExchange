<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="logo-square-dark.png" alt="LiveStockExchange" class="logo-img" />
      <span class="logo-text">LiveStockExchange</span>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Start tracking your favourite symbols</p>

    @if (error()) {
      <div class="error-banner">
        <span>{{ error() }}</span>
        <button (click)="error.set('')">×</button>
      </div>
    }

    <div class="form-group">
      <label>Full name</label>
      <input
        type="text"
        [(ngModel)]="fullName"
        placeholder="John Smith"
        [disabled]="loading()"
      />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        [disabled]="loading()"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Min. 8 characters"
        [disabled]="loading()"
        (keyup.enter)="submit()"
      />
    </div>

    <button
      class="btn-submit"
      (click)="submit()"
      [disabled]="loading() || !email || !password || !fullName"
    >
      {{ loading() ? 'Creating account...' : 'Create account' }}
    </button>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>

    <p class="auth-footer" style="margin-top: 6px">
      <a routerLink="/">← Back to charts</a>
    </p>

  </div>
</div>
