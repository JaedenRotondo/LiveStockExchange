<header class="flex items-center h-full px-4 pt-3">
  <!-- Top Row: Logo + Symbol Info + Sign In -->
  <div class="flex items-center justify-between w-full">
    <!-- Left: Logo + Title + Symbol Info -->
    <div class="flex items-center gap-4">
      <img src="logo-square-dark.png" alt="LiveStockExchange" class="h-8 w-8" />
      <span class="text-2xl font-bold text-[#e6edf3] tracking-wide">LiveStockExchange</span>

      <div class="w-px h-5 bg-[#30363d]"></div>

      <div class="flex items-center gap-3">
        <span class="text-sm font-medium text-[#e6edf3]">{{ selectedSymbol().pair }}</span>
        <span class="text-sm font-semibold text-[#e6edf3]">
          {{ currentQuote().price | number: '1.2-8' }}
        </span>
        <span
          class="text-xs font-medium px-1.5 py-0.5 rounded"
          [class.text-[#26a69a]]="currentQuote().change >= 0"
          [class.text-[#ef5350]]="currentQuote().change < 0"
        >
          {{ currentQuote().change >= 0 ? '+' : '' }}{{ currentQuote().changePercent | number: '1.2-2' }}%
        </span>
      </div>
    </div>

    <!-- Right: Sign In Button -->
    <button
      class="inline-flex items-center gap-2 rounded-md bg-[#0d1117] border border-[#30363d] px-4 py-1.5 text-sm font-medium text-[#e6edf3] shadow-sm transition-colors hover:bg-[#1c2128] hover:border-[#8b949e] focus:outline-none focus:ring-2 focus:ring-[#388bfd] focus:ring-offset-2 focus:ring-offset-[#161b22]"
    >
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      Sign In
    </button>
  </div>

</header>
