services:
  mysql:
    image: mysql:8.0
    container_name: screener_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: screener_db
      MYSQL_USER: screener_user
      MYSQL_PASSWORD: screener_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: